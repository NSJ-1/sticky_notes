{% extends "base.html" %}

{% block title %}All Notes{% endblock %}

{% block content %}
<h2>All Notes</h2>

<ul>
    {% for note in notes %}
    <li>
        <a href="{% url 'note_detail' note.pk %}">
            {{ note.title }}
        </a>
    </li>
    {% empty %}
    <p>No notes yet.</p>
    {% endfor %}
</ul>
{% endblock %}
